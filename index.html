        const commentsContainer = document.getElementById('comments');
        
        function getGenericAvatar(seed) {
            const colors = ['667eea','764ba2','f093fb','f5576c','4facfe','00f2fe','43e97b','38f9d7','fa709a','fee140','30cfd0','330867'];
            const c1 = colors[Math.floor(Math.random() * colors.length)];
            const c2 = colors[Math.floor(Math.random() * colors.length)];
            return `linear-gradient(135deg, #${c1}, #${c2})`;
        }
        
        function addComment(data) {
            const div = document.createElement('div');
            div.className = 'comment';
            const verifiedBadge = data.verified 
                ? '<span class="verified-comment"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>' 
                : '';
            
            // Get image source: Wikipedia API cache > direct pic > fallback
            let imgSrc;
            if (data.pic) {
                imgSrc = data.pic;
            } else if (data.wiki && imageCache[data.user]) {
                imgSrc = imageCache[data.user];
            } else {
                imgSrc = `https://i.pravatar.cc/150?u=${data.user}`;
            }
            
            const fallbackGradient = getGenericAvatar(data.user);
            const avatarHTML = `<div class="comment-avatar"><img src="${imgSrc}" alt="${data.user}" loading="eager" onerror="if(this.src.includes('pravatar')){this.style.display='none';this.parentElement.style.background='${fallbackGradient}';}else{this.src='https://i.pravatar.cc/150?u=${data.user}';}"></div>`;
            
            div.innerHTML = `
                ${avatarHTML}
                <div class="comment-body">
                    <div class="comment-username">${data.user}${verifiedBadge}</div>
                    <div class="comment-text">${data.text}</div>
                </div>
            `;
            commentsContainer.appendChild(div);
            
            while (commentsContainer.children.length > 6) {
                commentsContainer.removeChild(commentsContainer.firstChild);
            }
        }
        
        // Initial 4 comments
        const initial = [ commentData[0], commentData[12], commentData[24], commentData[37] ];
        initial.forEach(addComment);
        
        // Add new comment every 1.5-3 seconds
        function scheduleNextComment() {
            const delay = 1500 + Math.random() * 2000;
            setTimeout(() => {
                const random = commentData[Math.floor(Math.random() * commentData.length)];
                addComment(random);
                scheduleNextComment();
            }, delay);
        }
